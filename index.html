<!DOCTYPE html>
<html>
<head>
  <title>Holiday Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="app">

    <div class="page active" id="homePage">
      <h1>🌴 Holiday</h1>

      <div id="days"></div>
    </div>

    <div class="page" id="infoPage">
      <h1>ℹ️ Info</h1>
      <p>Flight details, hotel info, contacts, etc.</p>
    </div>

  </div>

  <div class="tab-bar">
    <button onclick="showPage('homePage')">🏠</button>
    <button onclick="showPage('infoPage')">ℹ️</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
